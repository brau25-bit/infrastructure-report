services:
  nginx:
    image: brauliio/front-report:latest
    restart: unless-stopped
    ports: 
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
  
  backend:
    image: brauliio/mi-api:latest
    restart: unless-stopped
    expose: 
      - "8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password
      POSTGRES_DB: serviciosCiudadanos
    healthcheck:
      test: 
        [
          "CMD-SHELL", 
          "pg_isready -U $${POSTGRES_USER} -d $${serviciosCiudadanos}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes: 
  postgres_data:
